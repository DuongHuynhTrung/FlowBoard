openapi: 3.0.0
info:
  title: FlowBoard Auth Service API
  version: 1.0.0
paths:
  /auth/register:
    post:
      summary: Register a new user
      responses:
        '201':
          description: Created
  /auth/login:
    post:
      summary: Login user
      responses:
        '200':
          description: OK
  /auth/refresh:
    post:
      summary: Refresh JWT token
      responses:
        '200':
          description: OK
  /auth/logout:
    post:
      summary: Logout user
      responses:
        '204':
          description: No Content
  /auth/google:
    post:
      summary: Google OAuth Login
      responses:
        '200':
          description: OK
  /auth/users/{id}/role:
    put:
      summary: Update user role
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /auth/users/me:
    get:
      summary: Get current authenticated user
      responses:
        '200':
          description: OK
